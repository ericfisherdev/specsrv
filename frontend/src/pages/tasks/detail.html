<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Detail - SpecSrv</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/htmx.org@2.0.6"></script>
</head>
<body class="bg-gray-50">
    <div id="app" x-data="taskDetail()">
        <!-- Navigation will be loaded here -->
        <div id="navigation"></div>

        <!-- Main Content -->
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                <!-- Task Header -->
                <div class="flex items-start justify-between mb-6">
                    <div class="flex-1">
                        <div class="flex items-center mb-2">
                            <a href="#" @click.prevent="navigateToProject()" class="text-gray-500 hover:text-gray-700 mr-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                                </svg>
                            </a>
                            <h1 class="text-2xl font-bold text-gray-900" x-text="task.title">Loading...</h1>
                            <span class="ml-3 px-3 py-1 text-sm font-medium rounded-full" 
                                  x-bind:class="getPriorityColor(task.priority)">
                                <span x-text="task.priority ? task.priority.charAt(0).toUpperCase() + task.priority.slice(1) : ''"></span> Priority
                            </span>
                        </div>
                        
                        <div class="flex items-center space-x-4 text-sm text-gray-500">
                            <div class="flex items-center">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                                </svg>
                                Project: <a href="#" @click.prevent="navigateToProject()" class="ml-1 text-blue-600 hover:underline" x-text="task.project?.title"></a>
                            </div>
                            <div class="flex items-center">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                                Created: <span x-text="formatDate(task.created_at)"></span>
                            </div>
                            <div class="flex items-center">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                Updated: <span x-text="formatDate(task.updated_at)"></span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center space-x-2 ml-4">
                        <button 
                            @click="editTask()"
                            class="inline-flex items-center px-3 py-2 border border-gray-300 shadow-sm text-sm leading-4 font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50"
                        >
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                            </svg>
                            Edit
                        </button>
                        <button 
                            @click="deleteTask()"
                            class="inline-flex items-center px-3 py-2 border border-transparent text-sm leading-4 font-medium rounded-md text-white bg-red-600 hover:bg-red-700"
                        >
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                            Delete
                        </button>
                    </div>
                </div>

                <!-- Status Badge -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium" 
                          x-bind:class="getStatusColor(task.status)">
                        <span x-text="formatStatus(task.status)"></span>
                    </span>
                </div>

                <!-- Description -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <div class="prose max-w-none">
                        <p class="text-gray-600" x-show="task.description" x-text="task.description"></p>
                        <p class="text-gray-400 italic" x-show="!task.description">No description provided</p>
                    </div>
                </div>

                <!-- Files Section -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Attached Files</label>
                    <div class="border border-gray-200 rounded-lg p-4">
                        <div x-show="task.files && task.files.length > 0" class="space-y-2">
                            <template x-for="file in task.files" :key="file.id">
                                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                    <div class="flex items-center space-x-3">
                                        <svg class="h-5 w-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                            <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/>
                                        </svg>
                                        <div>
                                            <p class="text-sm font-medium text-gray-900" x-text="file.filename"></p>
                                            <p class="text-xs text-gray-500" x-text="formatDate(file.created_at)"></p>
                                        </div>
                                    </div>
                                    <div class="flex items-center space-x-2">
                                        <a 
                                            :href="`/api/files/${file.id}/download`"
                                            class="text-blue-600 hover:text-blue-500 text-sm"
                                            download
                                        >
                                            Download
                                        </a>
                                        <button 
                                            @click="deleteFile(file.id)"
                                            class="text-red-600 hover:text-red-500 text-sm"
                                        >
                                            Delete
                                        </button>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <p x-show="!task.files || task.files.length === 0" class="text-gray-500 text-sm">No files attached</p>
                    </div>
                </div>

                <!-- Git Links Section -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Git Links</label>
                    <div class="border border-gray-200 rounded-lg p-4">
                        <div x-show="task.git_links && task.git_links.length > 0" class="space-y-2">
                            <template x-for="gitLink in task.git_links" :key="gitLink.id">
                                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                    <div class="flex items-center space-x-3">
                                        <svg class="h-5 w-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                            <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
                                        </svg>
                                        <div>
                                            <div x-show="gitLink.commit_hash">
                                                <p class="text-sm font-medium text-gray-900">
                                                    Commit: <span class="font-mono text-xs bg-gray-200 px-1 py-0.5 rounded" x-text="gitLink.commit_hash ? gitLink.commit_hash.substring(0, 8) + '...' : ''"></span>
                                                </p>
                                            </div>
                                            <div x-show="gitLink.pr_reference">
                                                <p class="text-sm font-medium text-gray-900">
                                                    Pull Request: <span class="text-blue-600" x-text="gitLink.pr_reference"></span>
                                                </p>
                                            </div>
                                            <p class="text-xs text-gray-500" x-text="formatDate(gitLink.created_at)"></p>
                                        </div>
                                    </div>
                                    <div x-show="gitLink.commit_hash && task.project?.github_repo" class="flex items-center space-x-2">
                                        <a 
                                            :href="`https://github.com/${task.project.github_repo}/commit/${gitLink.commit_hash}`"
                                            target="_blank"
                                            class="text-blue-600 hover:text-blue-500 text-sm"
                                        >
                                            View Commit
                                        </a>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <p x-show="!task.git_links || task.git_links.length === 0" class="text-gray-500 text-sm">No commits or pull requests linked</p>
                    </div>
                </div>

                <!-- AI Summary Section -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">AI Summary</label>
                    <div class="border border-gray-200 rounded-lg p-4 bg-gray-50">
                        <p class="text-gray-500 text-sm italic">AI summaries will be available in a future update</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { ApiService } from '../../services/ApiService.js';
        import { loadNavigation } from '../../components/Navigation.js';
        import { showNotification } from '../../utils/flashMessages.js';
        
        const api = new ApiService();
        
        // Load navigation
        loadNavigation();
        
        // Task detail functionality
        window.taskDetail = function() {
            return {
                task: {
                    title: 'Loading...',
                    description: '',
                    status: '',
                    priority: '',
                    project: null,
                    files: [],
                    git_links: [],
                    created_at: '',
                    updated_at: ''
                },
                
                async init() {
                    // Get task ID from URL parameters
                    const urlParams = new URLSearchParams(window.location.search);
                    const taskId = urlParams.get('id');
                    
                    if (taskId) {
                        await this.loadTask(taskId);
                    } else {
                        showNotification('No task ID provided', 'error');
                    }
                },
                
                async loadTask(taskId) {
                    try {
                        const response = await api.get(`/tasks/${taskId}`);
                        if (response.success) {
                            this.task = response.data;
                        } else {
                            showNotification('Failed to load task', 'error');
                        }
                    } catch (error) {
                        console.error('Error loading task:', error);
                        showNotification('Error loading task', 'error');
                    }
                },
                
                formatDate(dateString) {
                    if (!dateString) return 'Unknown';
                    const date = new Date(dateString);
                    return date.toLocaleDateString('en-US', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric',
                        hour: 'numeric',
                        minute: '2-digit'
                    });
                },
                
                formatStatus(status) {
                    if (!status) return '';
                    return status.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                },
                
                getStatusColor(status) {
                    const colors = {
                        'completed': 'bg-green-100 text-green-800',
                        'in_progress': 'bg-blue-100 text-blue-800',
                        'review': 'bg-yellow-100 text-yellow-800',
                        'todo': 'bg-gray-100 text-gray-800',
                        'blocked': 'bg-red-100 text-red-800'
                    };
                    return colors[status] || 'bg-gray-100 text-gray-800';
                },
                
                getPriorityColor(priority) {
                    const colors = {
                        'critical': 'bg-red-100 text-red-800',
                        'high': 'bg-orange-100 text-orange-800',
                        'medium': 'bg-yellow-100 text-yellow-800',
                        'low': 'bg-green-100 text-green-800'
                    };
                    return colors[priority] || 'bg-gray-100 text-gray-800';
                },
                
                navigateToProject() {
                    if (this.task.project?.id) {
                        window.location.href = `/projects/detail.html?id=${this.task.project.id}`;
                    }
                },
                
                editTask() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const taskId = urlParams.get('id');
                    window.location.href = `/tasks/edit.html?id=${taskId}`;
                },
                
                async deleteTask() {
                    if (!confirm('Are you sure you want to delete this task?')) {
                        return;
                    }
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    const taskId = urlParams.get('id');
                    
                    try {
                        const response = await api.delete(`/tasks/${taskId}`);
                        if (response.success) {
                            showNotification('Task deleted successfully', 'success');
                            setTimeout(() => {
                                this.navigateToProject();
                            }, 1000);
                        } else {
                            showNotification('Failed to delete task', 'error');
                        }
                    } catch (error) {
                        console.error('Error deleting task:', error);
                        showNotification('Error deleting task', 'error');
                    }
                },
                
                async deleteFile(fileId) {
                    if (!confirm('Are you sure you want to delete this file?')) {
                        return;
                    }
                    
                    try {
                        const response = await api.delete(`/files/${fileId}`);
                        if (response.success) {
                            this.task.files = this.task.files.filter(f => f.id !== fileId);
                            showNotification('File deleted successfully', 'success');
                        } else {
                            showNotification('Failed to delete file', 'error');
                        }
                    } catch (error) {
                        console.error('Error deleting file:', error);
                        showNotification('Error deleting file', 'error');
                    }
                }
            }
        };
    </script>
</body>
</html>
