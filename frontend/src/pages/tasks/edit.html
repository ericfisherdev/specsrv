<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - SpecSrv</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50">
    <div id="app" x-data="taskEdit()">
        <!-- Navigation will be loaded here -->
        <div id="navigation"></div>

        <!-- Main Content -->
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
                <h1 class="text-2xl font-bold text-gray-900 mb-6">Edit Task</h1>
                
                <form @submit.prevent="saveTask()">
                    <div class="mb-6">
                        <label for="task-title" class="block text-sm font-medium text-gray-700 mb-2">Task Title</label>
                        <input 
                            type="text" 
                            id="task-title" 
                            x-model="task.title"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            required
                        >
                    </div>
                    
                    <div class="mb-6">
                        <label for="task-description" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                        <textarea 
                            id="task-description" 
                            x-model="task.description"
                            rows="4"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        ></textarea>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label for="task-priority" class="block text-sm font-medium text-gray-700 mb-2">Priority</label>
                            <select 
                                id="task-priority" 
                                x-model="task.priority"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                        
                        <div>
                            <label for="task-status" class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                            <select 
                                id="task-status" 
                                x-model="task.status"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="todo">To Do</option>
                                <option value="in_progress">In Progress</option>
                                <option value="review">Review</option>
                                <option value="blocked">Blocked</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Project</label>
                        <div class="px-3 py-2 border border-gray-300 rounded-md bg-gray-50">
                            <span x-text="task.project?.title || 'Loading...'"></span>
                        </div>
                        <p class="mt-1 text-sm text-gray-500">Project cannot be changed after task creation</p>
                    </div>

                    <!-- File Management Section -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Attached Files</label>
                        
                        <!-- Existing Files -->
                        <div class="mb-4">
                            <div x-show="task.files && task.files.length > 0" class="space-y-2">
                                <template x-for="file in task.files" :key="file.id">
                                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                        <div class="flex items-center space-x-3">
                                            <svg class="h-5 w-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/>
                                            </svg>
                                            <div>
                                                <p class="text-sm font-medium text-gray-900" x-text="file.filename"></p>
                                                <p class="text-xs text-gray-500" x-text="formatDate(file.created_at)"></p>
                                            </div>
                                        </div>
                                        <div class="flex items-center space-x-2">
                                            <a 
                                                :href="`/api/files/${file.id}/download`"
                                                class="text-blue-600 hover:text-blue-500 text-sm"
                                                download
                                            >
                                                Download
                                            </a>
                                            <button 
                                                @click="removeFile(file.id)"
                                                class="text-red-600 hover:text-red-500 text-sm"
                                                type="button"
                                            >
                                                Delete
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <p x-show="!task.files || task.files.length === 0" class="text-gray-500 text-sm">No files currently attached</p>
                        </div>

                        <!-- File Upload Area -->
                        <div class="border-2 border-dashed border-gray-300 rounded-lg p-4" x-data="fileUpload()">
                            <div x-show="!uploading && newFiles.length === 0">
                                <div class="text-center">
                                    <svg class="mx-auto h-8 w-8 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                    <div class="mt-2">
                                        <label for="edit-files" class="cursor-pointer">
                                            <span class="text-sm font-medium text-gray-900">
                                                Add more files
                                            </span>
                                            <input 
                                                id="edit-files" 
                                                type="file" 
                                                class="sr-only" 
                                                multiple
                                                @change="handleFileSelect($event)"
                                            >
                                        </label>
                                        <p class="mt-1 text-xs text-gray-500">
                                            PNG, JPG, PDF, MD, TXT up to 10MB
                                        </p>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Upload Progress -->
                            <div x-show="uploading" class="text-center">
                                <div class="flex items-center justify-center">
                                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    <span class="text-sm text-gray-700">Uploading files...</span>
                                </div>
                            </div>
                            
                            <!-- File List for Upload -->
                            <div x-show="newFiles.length > 0 && !uploading" class="space-y-2">
                                <template x-for="file in newFiles" :key="file.name">
                                    <div class="flex items-center justify-between p-2 bg-gray-100 rounded">
                                        <span class="text-sm text-gray-700" x-text="file.name"></span>
                                        <div class="flex items-center space-x-2">
                                            <button type="button" @click="uploadFile(file)" class="text-blue-600 hover:text-blue-800 text-sm">Upload</button>
                                            <button type="button" @click="removeNewFile(file)" class="text-red-600 hover:text-red-800 text-sm">Remove</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Git Links Management Section -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Git Links</label>
                        
                        <!-- Existing Git Links -->
                        <div class="mb-4">
                            <div x-show="task.git_links && task.git_links.length > 0" class="space-y-2">
                                <template x-for="gitLink in task.git_links" :key="gitLink.id">
                                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                        <div class="flex items-center space-x-3">
                                            <svg class="h-5 w-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
                                            </svg>
                                            <div>
                                                <div x-show="gitLink.commit_hash">
                                                    <p class="text-sm font-medium text-gray-900">
                                                        Commit: <span class="font-mono text-xs bg-gray-200 px-1 py-0.5 rounded" x-text="gitLink.commit_hash ? gitLink.commit_hash.substring(0, 8) + '...' : ''"></span>
                                                    </p>
                                                </div>
                                                <div x-show="gitLink.pr_reference">
                                                    <p class="text-sm font-medium text-gray-900">
                                                        Pull Request: <span class="text-blue-600" x-text="gitLink.pr_reference"></span>
                                                    </p>
                                                </div>
                                                <p class="text-xs text-gray-500" x-text="formatDate(gitLink.created_at)"></p>
                                            </div>
                                        </div>
                                        <div class="flex items-center space-x-2">
                                            <button 
                                                @click="removeGitLink(gitLink.id)"
                                                class="text-red-600 hover:text-red-500 text-sm"
                                                type="button"
                                            >
                                                Delete
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                            <p x-show="!task.git_links || task.git_links.length === 0" class="text-gray-500 text-sm">No git links currently attached</p>
                        </div>

                        <!-- Add Git Link Form -->
                        <div class="border-2 border-dashed border-gray-300 rounded-lg p-4" x-data="gitLinkManager()">
                            <div class="space-y-4">
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label for="commit-hash" class="block text-sm font-medium text-gray-700 mb-1">Commit Hash</label>
                                        <input 
                                            type="text" 
                                            id="commit-hash"
                                            x-model="newGitLink.commitHash"
                                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            placeholder="e.g., a1b2c3d4e5f6"
                                        >
                                    </div>
                                    <div>
                                        <label for="pr-reference" class="block text-sm font-medium text-gray-700 mb-1">PR Reference</label>
                                        <input 
                                            type="text" 
                                            id="pr-reference"
                                            x-model="newGitLink.prReference"
                                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                            placeholder="e.g., #123 or PR-123"
                                        >
                                    </div>
                                </div>
                                <div class="flex justify-end">
                                    <button 
                                        @click="addGitLink()"
                                        x-bind:disabled="!canAddGitLink()"
                                        class="px-4 py-2 text-sm font-medium text-white bg-green-600 hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-md"
                                        type="button"
                                    >
                                        Add Git Link
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-end space-x-3">
                        <a 
                            :href="`/tasks/detail.html?id=${taskId}`"
                            class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-md"
                        >
                            Cancel
                        </a>
                        <button 
                            type="submit"
                            x-bind:disabled="saving"
                            class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md disabled:opacity-50"
                        >
                            <span x-text="saving ? 'Saving...' : 'Save Changes'"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { ApiService } from '../../services/ApiService.js';
        import { loadNavigation } from '../../components/Navigation.js';
        import { showNotification } from '../../utils/flashMessages.js';
        
        const api = new ApiService();
        
        // Load navigation
        loadNavigation();
        
        // Get task ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');
        
        // Task edit functionality
        window.taskEdit = function() {
            return {
                taskId: taskId,
                task: {
                    title: '',
                    description: '',
                    status: 'todo',
                    priority: 'medium',
                    project: null,
                    files: [],
                    git_links: []
                },
                saving: false,
                
                async init() {
                    if (this.taskId) {
                        await this.loadTask();
                    } else {
                        showNotification('No task ID provided', 'error');
                    }
                },
                
                async loadTask() {
                    try {
                        const response = await api.get(`/tasks/${this.taskId}`);
                        if (response.success) {
                            this.task = response.data;
                        } else {
                            showNotification('Failed to load task', 'error');
                        }
                    } catch (error) {
                        console.error('Error loading task:', error);
                        showNotification('Error loading task', 'error');
                    }
                },
                
                async saveTask() {
                    this.saving = true;
                    
                    try {
                        const response = await api.put(`/tasks/${this.taskId}`, {
                            title: this.task.title,
                            description: this.task.description,
                            status: this.task.status,
                            priority: this.task.priority
                        });
                        
                        if (response.success) {
                            showNotification('Task updated successfully', 'success');
                            setTimeout(() => {
                                window.location.href = `/tasks/detail.html?id=${this.taskId}`;
                            }, 1000);
                        } else {
                            showNotification('Failed to save task', 'error');
                        }
                    } catch (error) {
                        console.error('Error saving task:', error);
                        showNotification('Error saving task', 'error');
                    } finally {
                        this.saving = false;
                    }
                },
                
                formatDate(dateString) {
                    if (!dateString) return 'Unknown';
                    const date = new Date(dateString);
                    return date.toLocaleDateString();
                },
                
                async removeFile(fileId) {
                    if (!confirm('Are you sure you want to delete this file?')) {
                        return;
                    }
                    
                    try {
                        const response = await api.delete(`/files/${fileId}`);
                        if (response.success) {
                            this.task.files = this.task.files.filter(f => f.id !== fileId);
                            showNotification('File deleted successfully', 'success');
                        } else {
                            showNotification('Failed to delete file', 'error');
                        }
                    } catch (error) {
                        console.error('Error deleting file:', error);
                        showNotification('Error deleting file', 'error');
                    }
                },
                
                async removeGitLink(gitLinkId) {
                    if (!confirm('Are you sure you want to delete this git link?')) {
                        return;
                    }
                    
                    try {
                        const response = await api.delete(`/git-links/${gitLinkId}`);
                        if (response.success) {
                            this.task.git_links = this.task.git_links.filter(g => g.id !== gitLinkId);
                            showNotification('Git link deleted successfully', 'success');
                        } else {
                            showNotification('Failed to delete git link', 'error');
                        }
                    } catch (error) {
                        console.error('Error deleting git link:', error);
                        showNotification('Error deleting git link', 'error');
                    }
                }
            }
        };
        
        // File upload functionality
        window.fileUpload = function() {
            return {
                newFiles: [],
                uploading: false,
                
                handleFileSelect(event) {
                    const files = Array.from(event.target.files);
                    this.newFiles.push(...files);
                },
                
                removeNewFile(file) {
                    const index = this.newFiles.findIndex(f => f === file);
                    if (index > -1) {
                        this.newFiles.splice(index, 1);
                    }
                },
                
                async uploadFile(file) {
                    this.uploading = true;
                    
                    try {
                        const formData = new FormData();
                        formData.append('files[]', file);
                        formData.append('task_id', taskId);
                        
                        const response = await api.uploadFile(formData);
                        
                        if (response.success) {
                            this.removeNewFile(file);
                            // Reload task to get updated files
                            await Alpine.$data(document.querySelector('[x-data="taskEdit()"]')).loadTask();
                            showNotification('File uploaded successfully', 'success');
                        } else {
                            showNotification('Failed to upload file', 'error');
                        }
                    } catch (error) {
                        console.error('Upload error:', error);
                        showNotification('An error occurred while uploading', 'error');
                    } finally {
                        this.uploading = false;
                    }
                }
            }
        };
        
        // Git link manager
        window.gitLinkManager = function() {
            return {
                newGitLink: {
                    commitHash: '',
                    prReference: ''
                },
                
                canAddGitLink() {
                    return this.newGitLink.commitHash.trim() !== '' || this.newGitLink.prReference.trim() !== '';
                },
                
                async addGitLink() {
                    if (!this.canAddGitLink()) {
                        return;
                    }
                    
                    try {
                        const response = await api.post('/git-links', {
                            task_id: taskId,
                            commit_hash: this.newGitLink.commitHash.trim() || null,
                            pr_reference: this.newGitLink.prReference.trim() || null
                        });
                        
                        if (response.success) {
                            this.newGitLink = {
                                commitHash: '',
                                prReference: ''
                            };
                            
                            // Reload task to get updated git links
                            await Alpine.$data(document.querySelector('[x-data="taskEdit()"]')).loadTask();
                            showNotification('Git link added successfully', 'success');
                        } else {
                            showNotification('Failed to add git link', 'error');
                        }
                    } catch (error) {
                        console.error('Add git link error:', error);
                        showNotification('An error occurred while adding git link', 'error');
                    }
                }
            }
        };
    </script>
</body>
</html>
