# Enhanced Nginx logging configuration for production monitoring

# Define log format for structured logging (JSON)
log_format json_combined escape=json
'{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"request_protocol":"$server_protocol",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_addr":"$upstream_addr",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_x_forwarded_for":"$http_x_forwarded_for",'
    '"http_host":"$http_host",'
    '"server_name":"$server_name",'
    '"request_id":"$req_id",'
    '"ssl_protocol":"$ssl_protocol",'
    '"ssl_cipher":"$ssl_cipher",'
    '"connection":"$connection",'
    '"connection_requests":"$connection_requests",'
    '"gzip_ratio":"$gzip_ratio"'
'}';

# Performance monitoring log format
log_format performance escape=json
'{'
    '"timestamp":"$time_iso8601",'
    '"request_id":"$req_id",'
    '"request_uri":"$request_uri",'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_connect_time":"$upstream_connect_time",'
    '"upstream_header_time":"$upstream_header_time",'
    '"bytes_sent":$bytes_sent,'
    '"gzip_ratio":"$gzip_ratio",'
    '"cache_status":"$upstream_cache_status"'
'}';

# Security log format
log_format security escape=json
'{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":$status,'
    '"http_user_agent":"$http_user_agent",'
    '"http_x_forwarded_for":"$http_x_forwarded_for",'
    '"ssl_protocol":"$ssl_protocol",'
    '"ssl_cipher":"$ssl_cipher",'
    '"request_id":"$req_id",'
    '"limit_req_status":"$limit_req_status"'
'}';

# Access log with rotation
access_log /var/log/nginx/access.log json_combined buffer=32k flush=5s;

# Performance log for requests taking more than 1 second
access_log /var/log/nginx/performance.log performance if=$slow_request buffer=16k;

# Security log for specific status codes
access_log /var/log/nginx/security.log security if=$security_log buffer=16k;

# Error log configuration
error_log /var/log/nginx/error.log warn;

# Define variables for conditional logging
map $request_time $slow_request {
    default 0;
    "~^[1-9]" 1;  # Log if request takes 1+ seconds
}

map $status $security_log {
    ~^[45] 1;  # Log 4xx and 5xx errors
    default 0;
}

# Enable request ID for tracing
map $http_x_request_id $req_id {
    default $http_x_request_id;
    "" $req_id_sequence;
}

map $msec $req_id_sequence {
    default "${msec}_${remote_addr}_${connection}";
}

