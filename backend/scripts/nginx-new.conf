# Optimized Nginx configuration for Symfony application
user app;
worker_processes auto;
pid /tmp/nginx.pid;
error_log stderr warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic configuration
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /dev/stdout main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Temporary directories for non-root user
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path /tmp/nginx_proxy_temp;
    fastcgi_temp_path /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path /tmp/nginx_uwsgi_temp;
    scgi_temp_path /tmp/nginx_scgi_temp;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    server {
        listen 8080;
        server_name _;
        
        root /app/public;
        index index.php;
        
        # Security: Don't expose server info
        server_tokens off;
        
        # Client max body size
        client_max_body_size 20M;
        
        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            
            # Serve pre-compressed files if available
            gzip_static on;
            
            # Security headers for assets
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            
            # Try to serve file directly, return 404 if not found
            try_files $uri =404;
        }
        
        # Assets directory - serve directly, don't fall back to PHP
        location /assets {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
        
        # Build directory - serve directly (webpack encore assets)
        location /build {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
        
        # Health check endpoint
        location = /health/liveness {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "healthy";
        }
        
        # Health check with full app readiness
        location = /health/readiness {
            try_files $uri /index.php$is_args$args;
        }
        
        # Rate limiting for login endpoints
        location ~ ^/(login|register) {
            limit_req zone=login burst=10 nodelay;
            try_files $uri /index.php$is_args$args;
        }
        
        # Rate limiting for API endpoints
        location ~ ^/api/ {
            limit_req zone=api burst=50 nodelay;
            try_files $uri /index.php$is_args$args;
        }
        
        # Main location block
        location / {
            # Try to serve file directly, fallback to index.php
            try_files $uri /index.php$is_args$args;
        }
        
        # PHP handling
        location ~ ^/index\.php(/|$) {
            # FastCGI configuration for PHP-FPM
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*);
            include fastcgi_params;
            
            # Symfony-specific parameters
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            # Security: prevent access to PHP files other than index.php
            internal;
            
            # Increase FastCGI timeouts for long-running requests
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 60s;
            fastcgi_read_timeout 60s;
            
            # Buffer configuration
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
            
            # Cache control for dynamic content
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        
        # Deny access to all other PHP files
        location ~ \.php$ {
            return 404;
        }
        
        # Deny access to sensitive files
        location ~ /\.(git|env|htaccess) {
            deny all;
            return 404;
        }
        
        # Deny access to sensitive directories
        location ~ ^/(var|vendor|config|migrations|tests)/ {
            deny all;
            return 404;
        }
    }
}