name: CI

on:
  push:
    branches: [ release, develop ]
  pull_request:
    branches: [ release, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php-version: [8.1, 8.2, 8.3]
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        tools: composer:v2
        coverage: xdebug

    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: /tmp/composer-cache
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

    - name: Install dependencies
      working-directory: backend
      run: |
        composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Create test database
      working-directory: backend
      run: |
        APP_ENV=test php bin/console doctrine:database:create --if-not-exists
        APP_ENV=test php bin/console doctrine:migrations:migrate --no-interaction

    - name: Run PHPStan
      working-directory: backend
      run: composer lint

    - name: Run PHP CS Fixer (check only)
      working-directory: backend
      run: composer cs-check

    - name: Run PHPUnit
      working-directory: backend
      run: composer test

    - name: Run PHPUnit with coverage
      working-directory: backend
      if: matrix.php-version == '8.2'
      run: composer test-coverage

    - name: Upload coverage to Codecov
      if: matrix.php-version == '8.2'
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/var/coverage/coverage.xml
        fail_ci_if_error: true

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        tools: composer:v2

    - name: Install dependencies
      working-directory: backend
      run: composer install --no-dev --no-progress --prefer-dist --optimize-autoloader

    - name: Security check
      working-directory: backend
      run: composer security-check

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, security-check]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      working-directory: backend
      run: |
        docker build -t specsrv-backend:test .

    - name: Test Docker image
      working-directory: backend
      run: |
        docker run --rm specsrv-backend:test php bin/console --version