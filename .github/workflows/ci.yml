name: CI

on:
  push:
    branches: [ release, develop ]
  pull_request:
    branches: [ release, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: specsrv1234
          POSTGRES_USER: specsrv-db-user
          POSTGRES_DB: specsrv
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    
    strategy:
      matrix:
        php-version: [8.1, 8.2, 8.3]
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: pdo, pdo_pgsql, pgsql
        tools: composer:v2
        coverage: xdebug

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: /tmp/composer-cache
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

    - name: Create test .env file
      working-directory: backend
      run: |
        ls -la .env*
        cp .env.test .env
        ls -la .env
        cat .env

    - name: Install dependencies
      working-directory: backend
      run: |
        composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Setup PostgreSQL databases and extensions
      run: |
        # Create test database (Doctrine will append _test to base name 'specsrv', so we need 'specsrv_test')
        PGPASSWORD=specsrv1234 psql -h localhost -p 5433 -U specsrv-db-user -d specsrv -c 'CREATE DATABASE specsrv_test;'
        # Add extensions to both databases
        PGPASSWORD=specsrv1234 psql -h localhost -p 5433 -U specsrv-db-user -d specsrv -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
        PGPASSWORD=specsrv1234 psql -h localhost -p 5433 -U specsrv-db-user -d specsrv -c 'CREATE EXTENSION IF NOT EXISTS "pg_trgm";'
        PGPASSWORD=specsrv1234 psql -h localhost -p 5433 -U specsrv-db-user -d specsrv_test -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
        PGPASSWORD=specsrv1234 psql -h localhost -p 5433 -U specsrv-db-user -d specsrv_test -c 'CREATE EXTENSION IF NOT EXISTS "pg_trgm";'

    - name: Setup test environment and database
      working-directory: backend
      run: |
        mkdir -p var/data var/log var/cache var/coverage config/jwt
        chmod -R 755 var/
        # Generate JWT keys for testing
        openssl genrsa -out config/jwt/private.pem -aes256 -passout pass:${{ secrets.JWT_PASSPHRASE }} 4096
        openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem -passin pass:${{ secrets.JWT_PASSPHRASE }}
        APP_ENV=test php bin/console cache:clear
        # Initialize migration metadata storage
        APP_ENV=test php bin/console doctrine:migrations:sync-metadata-storage
        # Mark SQLite-specific migrations as executed (they're incompatible with PostgreSQL)
        APP_ENV=test php bin/console doctrine:migrations:version --add --no-interaction DoctrineMigrations\\Version20250829000001
        APP_ENV=test php bin/console doctrine:migrations:version --add --no-interaction DoctrineMigrations\\Version20250829072001
        APP_ENV=test php bin/console doctrine:migrations:version --add --no-interaction DoctrineMigrations\\Version20250829145411
        APP_ENV=test php bin/console doctrine:migrations:version --add --no-interaction DoctrineMigrations\\Version20250830120000
        # Run only the PostgreSQL-compatible migration
        APP_ENV=test php bin/console doctrine:migrations:migrate --no-interaction

    - name: Run PHPStan
      working-directory: backend
      run: |
        mkdir -p var/cache/phpstan
        composer lint

    - name: Run PHP CS Fixer (check only)
      working-directory: backend
      run: composer cs-check

    - name: Run PHPUnit
      working-directory: backend
      run: composer test

    - name: Run PHPUnit with coverage
      working-directory: backend
      if: matrix.php-version == '8.2'
      run: |
        mkdir -p var/coverage
        composer test-coverage || echo "Coverage generation failed, continuing without coverage"
      continue-on-error: true

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        tools: composer:v2

    - name: Create minimal .env file for Symfony
      working-directory: backend
      run: |
        echo "APP_ENV=prod" > .env
        echo "APP_SECRET=dev_secret_for_build_only" >> .env
        echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/data/database.sqlite" >> .env
        echo "CORS_ALLOW_ORIGIN=http://localhost:3000" >> .env
        # JWT keys for basic Symfony functionality (not actually used in security check)
        mkdir -p config/jwt
        echo "JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem" >> .env
        echo "JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem" >> .env
        echo "JWT_PASSPHRASE=dummy_passphrase_for_build" >> .env
        # Create dummy JWT keys
        openssl genrsa -out config/jwt/private.pem -aes256 -passout pass:dummy_passphrase_for_build 2048
        openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem -passin pass:dummy_passphrase_for_build

    - name: Install dependencies
      working-directory: backend
      run: composer install --no-dev --no-progress --prefer-dist --optimize-autoloader

    - name: Security check
      working-directory: backend
      run: composer security-check

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, security-check]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Create minimal .env file for Docker build
      run: |
        echo "APP_ENV=prod" > backend/.env
        echo "APP_SECRET=docker_build_secret" >> backend/.env
        echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/data/database.sqlite" >> backend/.env
        echo "CORS_ALLOW_ORIGIN=http://localhost:3000" >> backend/.env

    - name: Build Docker image
      run: |
        docker build --target runtime -t specsrv-backend:test -f backend/Dockerfile .

    - name: Test Docker image
      run: |
        docker run --rm specsrv-backend:test php bin/console --version

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Run frontend linting
      working-directory: frontend
      run: npm run lint

    - name: Run frontend unit tests
      working-directory: frontend
      run: npm test

    - name: Run frontend test coverage
      working-directory: frontend
      run: npm run test:coverage

    - name: Build frontend
      working-directory: frontend
      run: npm run build


  build-frontend-docker:
    runs-on: ubuntu-latest
    needs: [frontend-test]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build frontend Docker image
      working-directory: frontend
      run: |
        docker build -t specsrv-frontend:test .

    - name: Test frontend Docker image
      working-directory: frontend
      run: |
        docker run -d --name test-frontend -p 3000:80 specsrv-frontend:test
        # Wait for container to be ready with retry logic
        for i in {1..30}; do
          if curl -f --max-time 2 http://localhost:3000/ >/dev/null 2>&1; then
            echo "Frontend container is ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "Frontend container failed to start within 30 seconds"
            exit 1
          fi
          echo "Waiting for frontend container... ($i/30)"
          sleep 1
        done
        # Ensure cleanup happens regardless of success or failure
        trap 'docker stop test-frontend 2>/dev/null; docker rm test-frontend 2>/dev/null' EXIT