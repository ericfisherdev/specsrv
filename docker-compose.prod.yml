version: '3.8'

services:
  specsrv-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: specsrv-backend-prod
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=prod
      - APP_DEBUG=0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-specsrv-db-user}:${POSTGRES_PASSWORD:?set in .env}@specsrv-postgres:5432/${POSTGRES_DB:-specsrv}?sslmode=require
    volumes:
      # Named volumes for persistent data only - no source code mount
      - specsrv-data:/app/var/data
      - specsrv-logs:/app/var/log
      - specsrv-uploads:/app/var/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - specsrv-network
    depends_on:
      specsrv-postgres:
        condition: service_healthy

  specsrv-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: specsrv-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      - API_URL=http://specsrv-backend:8080
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "-L", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - specsrv-network
    depends_on:
      - specsrv-backend

  specsrv-postgres:
    image: postgres:15
    container_name: specsrv-postgres-prod
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-specsrv}
      - POSTGRES_USER=${POSTGRES_USER:-specsrv-db-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - specsrv-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-specsrv-db-user} -d ${POSTGRES_DB:-specsrv}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - specsrv-network

volumes:
  specsrv-data:
    driver: local
  specsrv-logs:
    driver: local
  specsrv-uploads:
    driver: local
  specsrv-postgres-data:
    driver: local

networks:
  specsrv-network:
    driver: bridge
    name: specsrv-network