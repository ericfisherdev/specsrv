repos:
  - repo: local
    hooks:
      - id: php-cs-fixer
        name: PHP CS Fixer
        entry: backend/vendor/bin/php-cs-fixer
        language: system
        files: \.php$
        args: ['fix', '--config=backend/.php-cs-fixer.dist.php', '--dry-run', '--diff']
        pass_filenames: false
        
      - id: phpstan
        name: PHPStan
        entry: bash -c 'cd backend && vendor/bin/phpstan analyse'
        language: system
        files: \.php$
        pass_filenames: false
        
      - id: phpunit
        name: PHPUnit
        entry: bash -c 'cd backend && php bin/phpunit'
        language: system
        files: \.php$
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']