services:
  specsrv-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: specsrv-backend
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-specsrv-db-user}:${POSTGRES_PASSWORD:?set in .env}@specsrv-postgres:5432/${POSTGRES_DB:-specsrv_dev}
    volumes:
      # Mount source code for development - this will override the COPY in Dockerfile
      - ./backend:/app:cached
      # Create named volumes for directories that shouldn't be overridden
      - specsrv-cache:/app/var/cache
      - specsrv-logs:/app/var/log  
      - specsrv-uploads:/app/var/uploads
      - node-modules-vol:/app/node_modules
      - vendor-vol:/app/vendor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - specsrv-network
    depends_on:
      specsrv-postgres:
        condition: service_healthy

  specsrv-postgres:
    image: postgres:15
    container_name: specsrv-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-specsrv_dev}
      - POSTGRES_USER=${POSTGRES_USER:-specsrv-db-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - specsrv-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-specsrv-db-user} -d ${POSTGRES_DB:-specsrv_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - specsrv-network

  specsrv-frontend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: frontend
    container_name: specsrv-frontend-build
    volumes:
      - ./backend/assets:/app/assets
      - specsrv-assets:/app/public/build
    command: ["npm", "run", "watch"]
    networks:
      - specsrv-network
    profiles:
      - dev

  # Nginx proxy for production-like setup (optional)
  specsrv-proxy:
    image: nginx:alpine
    container_name: specsrv-proxy
    ports:
      - "80:80"
    volumes:
      - ./scripts/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - specsrv-assets:/var/www/html/build:ro
    depends_on:
      specsrv-backend:
        condition: service_healthy
    networks:
      - specsrv-network
    profiles:
      - production

volumes:
  specsrv-cache:
    driver: local
  specsrv-logs:
    driver: local
  specsrv-uploads:
    driver: local
  specsrv-assets:
    driver: local
  specsrv-postgres-data:
    driver: local
  node-modules-vol:
    driver: local
  vendor-vol:
    driver: local

networks:
  specsrv-network:
    driver: bridge
    name: specsrv-network