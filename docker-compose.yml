services:
  specsrv-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: specsrv-backend
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-specsrv-db-user}:${POSTGRES_PASSWORD:?set in .env}@specsrv-postgres:5432/${POSTGRES_DB:-specsrv_dev}
    volumes:
      # Mount entire backend directory for development
      - type: bind
        source: ./backend
        target: /app
        consistency: cached
      # Create named volumes for directories that shouldn't be overridden
      - type: volume
        source: specsrv-cache
        target: /app/var/cache
      - type: volume
        source: specsrv-logs
        target: /app/var/log
      - type: volume
        source: specsrv-uploads
        target: /app/var/uploads
      - type: volume
        source: node-modules-vol
        target: /app/node_modules
      - type: volume
        source: vendor-vol
        target: /app/vendor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - specsrv-network
    depends_on:
      specsrv-postgres:
        condition: service_healthy

  specsrv-postgres:
    image: postgres:15
    container_name: specsrv-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-specsrv_dev}
      - POSTGRES_USER=${POSTGRES_USER:-specsrv-db-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - specsrv-postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-specsrv-db-user} -d ${POSTGRES_DB:-specsrv_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - specsrv-network

  specsrv-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: specsrv-frontend
    ports:
      - "3000:80"
    environment:
      - API_BASE_URL=http://specsrv-backend:8080
      - NODE_ENV=production
    depends_on:
      specsrv-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - specsrv-network
    profiles:
      - production

  specsrv-frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: specsrv-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://specsrv-backend:8080
      - NODE_ENV=development
    volumes:
      - ./frontend:/app:cached
      - frontend-node-modules:/app/node_modules
    command: ["npm", "run", "dev"]
    depends_on:
      specsrv-backend:
        condition: service_healthy
    networks:
      - specsrv-network
    profiles:
      - dev

  # Nginx proxy for production-like setup (optional)
  specsrv-proxy:
    image: nginx:alpine
    container_name: specsrv-proxy
    ports:
      - "80:80"
    volumes:
      - ./scripts/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - specsrv-assets:/var/www/html/build:ro
    depends_on:
      specsrv-backend:
        condition: service_healthy
    networks:
      - specsrv-network
    profiles:
      - production

volumes:
  specsrv-cache:
    driver: local
  specsrv-logs:
    driver: local
  specsrv-uploads:
    driver: local
  specsrv-assets:
    driver: local
  specsrv-postgres-data:
    driver: local
  node-modules-vol:
    driver: local
  vendor-vol:
    driver: local
  frontend-node-modules:
    driver: local

networks:
  specsrv-network:
    driver: bridge
    name: specsrv-network